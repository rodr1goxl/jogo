<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rota das Especiarias</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="header">
            <div class="logo">🧭 ROTA DAS ESPECIARIAS</div>
            <div class="welcome-banner">Bem-vindo a bordo, Capitão!</div>
        </header>

        <main class="main-content">
            <aside class="sidebar card">
                <h2>Recursos</h2>
                <div class="resource-item">
                    <span class="icon">💰</span>
                    <div class="info">
                        <strong>Ouro:</strong>
                        <span id="gold-display">50 moedas</span>
                    </div>
                </div>
                <div class="resource-item">
                    <span class="icon">⛵</span>
                    <div class="info">
                        <strong>Saúde do Navio: 100%</strong>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill green"></div>
                        </div>
                    </div>
                </div>
                <div class="resource-item">
                    <span class="icon">📍</span>
                    <div class="info">
                        <strong>Progresso:</strong>
                        <div class="progress-tag" id="progress-text">0/5 etapas concluídas</div>
                    </div>
                </div>
                <div class="compass-decoration">🧭</div>
            </aside>

            <section class="challenge-panel">
                <div class="parchment">
                    <h1 class="challenge-title" id="challenge-title">Carregando fase...</h1>
                    <hr>
                    <div class="challenge-body">
                        <p id="challenge-desc"><strong>Desafio:</strong> ...</p>
                        <div class="hint-box">
                            <p id="hint-text"><strong>DICA:</strong> ...</p>
                            <p class="word-slots" id="word-slots">PALAVRA: _ _ _</p>
                        </div>
                    </div>
                </div>
                <div class="ship-illustration">🚢</div>
            </section>

            <aside class="action-panel card">
                <h2>Faça Sua Jogada</h2>
                <div class="input-group">
                    <label>Sua Aposta (Ouro):</label>
                    <input type="number" id="bet-amount" value="10" min="1">
                </div>
                <div class="input-group">
                    <label>Seu Palpite:</label>
                    <input type="text" id="player-guess" placeholder="Digite a palavra...">
                </div>
                <button class="btn btn-primary" id="btn-submit">Enviar Palpite e Aposta</button>
                <button class="btn btn-secondary" id="btn-hint">Comprar Letra <br><small>(Custa 5 Ouro)</small></button>
            </aside>
        </main>

    </div>

    <script src="script.js"></script>
</body>
</html>
